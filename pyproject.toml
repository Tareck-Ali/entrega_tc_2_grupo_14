[project]
name = "entrega-tc-2-grupo-14"
version = "0.1.0"
description = "Tech Challenge do grupo 14"
authors = [
    {name = "Tareck",email = "tareckali@outlook.com"}
]
license = ""
requires-python = ">=3.12, <3.14"
dependencies = [
    "torch (>=2.12.0,<3.0.0)",
    "scikit-learn (>=1.9.0,<2.0.0)",
    "mlflow (>=3.13.0,<4.0.0)",
    "dvc (>=3.67.1,<4.0.0)"
]

[dependency-groups]
